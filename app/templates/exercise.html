{% extends "navBar.html" %}

{% block title %}Exercise{% endblock %}

{% block scripts %}
    <script src="{{ url_for('static', filename='js/exerciseHandler.js') }}"></script>
    <script src="{{ url_for('static', filename='js/easytimer.min.js')}}"></script>
{% endblock %}


{% block content %}
<div id="alertBox"></div>


<div class="d-flex flex-column justify-content-center align-items-center" style="height: 80vh;">
    <p id="timer"><span id="initialTime"></span></p>
    <div class="card" style="width: 30rem;">
        <div class="card-body d-flex flex-column align-items-center">
            <h5 class="card-title">Conjugate....</h5>
            <button type="button" class="btn btn-info" id="verbText"><b>{{infinitive}}</b> - {{translation}}</button>
            <small class="form-text text-muted">Press me to hear me!</small>
            <p class="card-text" id="tenseText">{{mood}}, {{tense}} tense</p>
            <p class="card-text" id="pronounText">The pronoun is {{pronoun}}</p>
            <input type="text" class="form-control" placeholder="Enter your answer" id="textAnswer">
            <div class="d-flex justify-content-between w-100" style="margin-top: 10px;">
                <button type="button" class="btn btn-danger" id="previous">Previous</button>
                <button type="submit" class="btn btn-primary" id="next">Next</button>
            </div>
            <small class="form-text text-muted">Stuck? get a <a href="google.com">hint!</a></small>
            <p class="card-text" id="questionCount"><b>Question 1/20</b></p>
        </div>
    </div>
</div>

{% endblock %}
